<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- OctoBot pixel-art pink octopus (32×32 pixel grid) -->

  <!-- Background / transparent -->

  <!-- ── Tentacles (bottom, waving) ── -->
  <!-- Tentacle 1 (far left) -->
  <rect x="2"  y="22" width="2" height="4" fill="#e87ab7"/>
  <rect x="2"  y="26" width="2" height="2" fill="#e87ab7"/>
  <rect x="0"  y="28" width="2" height="2" fill="#e87ab7"/>
  <!-- Tentacle 2 -->
  <rect x="6"  y="22" width="2" height="4" fill="#f090c8"/>
  <rect x="6"  y="26" width="2" height="2" fill="#f090c8"/>
  <rect x="4"  y="28" width="2" height="2" fill="#f090c8"/>
  <!-- Tentacle 3 -->
  <rect x="10" y="22" width="2" height="4" fill="#f090c8"/>
  <rect x="10" y="26" width="2" height="2" fill="#f090c8"/>
  <rect x="10" y="28" width="2" height="2" fill="#f090c8"/>
  <!-- Tentacle 4 -->
  <rect x="14" y="22" width="2" height="4" fill="#e87ab7"/>
  <rect x="14" y="26" width="2" height="2" fill="#e87ab7"/>
  <rect x="16" y="28" width="2" height="2" fill="#e87ab7"/>
  <!-- Tentacle 5 -->
  <rect x="18" y="22" width="2" height="4" fill="#f090c8"/>
  <rect x="18" y="26" width="2" height="2" fill="#f090c8"/>
  <rect x="18" y="28" width="2" height="2" fill="#f090c8"/>
  <!-- Tentacle 6 -->
  <rect x="22" y="22" width="2" height="4" fill="#f090c8"/>
  <rect x="22" y="26" width="2" height="2" fill="#f090c8"/>
  <rect x="22" y="28" width="2" height="2" fill="#f090c8"/>
  <!-- Tentacle 7 -->
  <rect x="26" y="22" width="2" height="4" fill="#e87ab7"/>
  <rect x="26" y="26" width="2" height="2" fill="#e87ab7"/>
  <rect x="28" y="28" width="2" height="2" fill="#e87ab7"/>
  <!-- Tentacle 8 (far right) -->
  <rect x="28" y="22" width="2" height="5" fill="#e87ab7"/>

  <!-- ── Body ── -->
  <!-- Main dome -->
  <rect x="6"  y="4"  width="20" height="2"  fill="#ff99cc"/>
  <rect x="4"  y="6"  width="24" height="2"  fill="#ff99cc"/>
  <rect x="2"  y="8"  width="28" height="2"  fill="#ffaadd"/>
  <rect x="2"  y="10" width="28" height="2"  fill="#ffaadd"/>
  <rect x="2"  y="12" width="28" height="2"  fill="#ff99cc"/>
  <rect x="2"  y="14" width="28" height="2"  fill="#ff99cc"/>
  <rect x="2"  y="16" width="28" height="2"  fill="#ff88bb"/>
  <rect x="4"  y="18" width="24" height="2"  fill="#ff88bb"/>
  <rect x="6"  y="20" width="20" height="2"  fill="#ff88bb"/>

  <!-- Body highlight -->
  <rect x="8"  y="6"  width="4"  height="4"  fill="#ffccee"/>
  <rect x="10" y="5"  width="2"  height="2"  fill="#ffddf5"/>

  <!-- ── Face ── -->
  <!-- Left eye socket -->
  <rect x="8"  y="10" width="6"  height="6"  fill="#fff"/>
  <!-- Right eye socket -->
  <rect x="18" y="10" width="6"  height="6"  fill="#fff"/>

  <!-- Eye rims -->
  <rect x="7"  y="9"  width="8"  height="8"  fill="none" stroke="#cc55aa" stroke-width="1"/>
  <rect x="17" y="9"  width="8"  height="8"  fill="none" stroke="#cc55aa" stroke-width="1"/>

  <!-- Left pupil (large, cute) -->
  <rect x="10" y="12" width="3"  height="3"  fill="#220033"/>
  <!-- Right pupil -->
  <rect x="20" y="12" width="3"  height="3"  fill="#220033"/>

  <!-- Pupil shine -->
  <rect x="10" y="12" width="1"  height="1"  fill="#ffffff"/>
  <rect x="20" y="12" width="1"  height="1"  fill="#ffffff"/>

  <!-- Blushing cheeks -->
  <rect x="6"  y="15" width="4"  height="2"  fill="#ff6699" opacity="0.5"/>
  <rect x="22" y="15" width="4"  height="2"  fill="#ff6699" opacity="0.5"/>

  <!-- Smile -->
  <rect x="12" y="17" width="2"  height="1"  fill="#cc3388"/>
  <rect x="14" y="18" width="4"  height="1"  fill="#cc3388"/>
  <rect x="18" y="17" width="2"  height="1"  fill="#cc3388"/>

  <!-- ── Crown / hat (tiny librarian beret) ── -->
  <rect x="10" y="2"  width="12" height="3"  fill="#9933cc"/>
  <rect x="8"  y="3"  width="16" height="2"  fill="#aa44dd"/>
  <rect x="13" y="1"  width="6"  height="2"  fill="#bb55ee"/>
  <rect x="14" y="0"  width="4"  height="1"  fill="#cc66ff"/>

  <!-- Hat band -->
  <rect x="8"  y="4"  width="16" height="1"  fill="#ffaaee"/>
</svg>
