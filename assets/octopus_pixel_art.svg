<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="128" height="128" shape-rendering="crispEdges">
  <!-- OctoBot pixel-art sprite — matches the in-game drawOctoBot exactly -->

  <!-- Head outline -->
  <rect x="6" y="0" width="12" height="1" fill="#110020"/>
  <rect x="4" y="1" width="16" height="1" fill="#110020"/>
  <rect x="3" y="2" width="18" height="1" fill="#110020"/>
  <rect x="2" y="3" width="20" height="10" fill="#110020"/>
  <rect x="3" y="13" width="18" height="1" fill="#110020"/>

  <!-- Body fill — hot pink -->
  <rect x="7" y="1" width="10" height="1" fill="#ff2d9b"/>
  <rect x="5" y="2" width="14" height="1" fill="#ff2d9b"/>
  <rect x="4" y="3" width="16" height="9" fill="#ff2d9b"/>
  <rect x="5" y="12" width="14" height="1" fill="#ff2d9b"/>

  <!-- Top highlight -->
  <rect x="8" y="1" width="5" height="1" fill="#ff80cc"/>
  <rect x="6" y="2" width="6" height="1" fill="#ff80cc"/>
  <rect x="5" y="3" width="5" height="2" fill="#ff80cc"/>
  <rect x="7" y="2" width="2" height="1" fill="#ffaadd"/>

  <!-- Left eye socket -->
  <rect x="5" y="4" width="5" height="5" fill="#0a0020"/>
  <!-- Right eye socket -->
  <rect x="14" y="4" width="5" height="5" fill="#0a0020"/>

  <!-- Left eye — cyan -->
  <rect x="6" y="5" width="3" height="3" fill="#00f7ff"/>
  <rect x="6" y="5" width="2" height="2" fill="#80ffff"/>
  <!-- Left pupil -->
  <rect x="7" y="6" width="2" height="2" fill="#003344"/>
  <!-- Left sparkle -->
  <rect x="6" y="5" width="1" height="1" fill="#ffffff"/>

  <!-- Right eye — cyan -->
  <rect x="15" y="5" width="3" height="3" fill="#00f7ff"/>
  <rect x="15" y="5" width="2" height="2" fill="#80ffff"/>
  <!-- Right pupil -->
  <rect x="16" y="6" width="2" height="2" fill="#003344"/>
  <!-- Right sparkle -->
  <rect x="15" y="5" width="1" height="1" fill="#ffffff"/>

  <!-- Mouth -->
  <rect x="10" y="10" width="4" height="1" fill="#cc0066"/>
  <rect x="9" y="9" width="1" height="1" fill="#cc0066"/>
  <rect x="14" y="9" width="1" height="1" fill="#cc0066"/>

  <!-- Cheek blush -->
  <rect x="4" y="8" width="2" height="2" fill="#ff0066" opacity="0.4"/>
  <rect x="18" y="8" width="2" height="2" fill="#ff0066" opacity="0.4"/>

  <!-- 8 Tentacles — alternating pink and cyan -->
  <!-- Tentacle 1 (far left, pink) -->
  <rect x="2" y="13" width="2" height="3" fill="#ff2d9b"/>
  <rect x="1" y="16" width="2" height="3" fill="#ff2d9b"/>
  <rect x="0" y="19" width="2" height="2" fill="#ff2d9b"/>
  <rect x="1" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 2 (pink-light) -->
  <rect x="4" y="13" width="2" height="3" fill="#ff5eb5"/>
  <rect x="3" y="16" width="2" height="3" fill="#ff5eb5"/>
  <rect x="3" y="19" width="2" height="2" fill="#ff5eb5"/>
  <rect x="3" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 3 (cyan) -->
  <rect x="6" y="13" width="2" height="3" fill="#00f7ff"/>
  <rect x="7" y="16" width="2" height="3" fill="#00f7ff"/>
  <rect x="7" y="19" width="2" height="2" fill="#00f7ff"/>
  <rect x="7" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 4 (cyan-dark) -->
  <rect x="9" y="13" width="2" height="3" fill="#00ccdd"/>
  <rect x="9" y="16" width="2" height="3" fill="#00ccdd"/>
  <rect x="10" y="19" width="2" height="2" fill="#00ccdd"/>
  <rect x="9" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 5 (pink) -->
  <rect x="13" y="13" width="2" height="3" fill="#ff2d9b"/>
  <rect x="13" y="16" width="2" height="3" fill="#ff2d9b"/>
  <rect x="12" y="19" width="2" height="2" fill="#ff2d9b"/>
  <rect x="13" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 6 (pink-light) -->
  <rect x="16" y="13" width="2" height="3" fill="#ff5eb5"/>
  <rect x="15" y="16" width="2" height="3" fill="#ff5eb5"/>
  <rect x="15" y="19" width="2" height="2" fill="#ff5eb5"/>
  <rect x="15" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 7 (cyan) -->
  <rect x="18" y="13" width="2" height="3" fill="#00f7ff"/>
  <rect x="19" y="16" width="2" height="3" fill="#00f7ff"/>
  <rect x="19" y="19" width="2" height="2" fill="#00f7ff"/>
  <rect x="19" y="17" width="1" height="1" fill="#ffccee"/>

  <!-- Tentacle 8 (far right, cyan-dark) -->
  <rect x="20" y="13" width="2" height="3" fill="#00ccdd"/>
  <rect x="21" y="16" width="2" height="3" fill="#00ccdd"/>
  <rect x="22" y="19" width="2" height="2" fill="#00ccdd"/>
  <rect x="21" y="17" width="1" height="1" fill="#ffccee"/>
</svg>
